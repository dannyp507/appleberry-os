version: '3.9'

services:
  # PostgreSQL Database - Production Ready
  postgres:
    image: postgres:16-alpine
    container_name: appleberry_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appleberry_messaging_os}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appleberry_messaging_os}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appleberry_internal
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"

  # Redis - Job Queue & Cache
  redis:
    image: redis:7-alpine
    container_name: appleberry_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appleberry_internal
    command: redis-server --appendonly yes --appendfsync everysec

  # MinIO - S3-Compatible Storage
  minio:
    image: minio/minio:latest
    container_name: appleberry_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?error}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - appleberry_internal
    command: server /data --console-address ":9001"

  # Appleberry API - NestJS Backend
  api:
    build:
      context: ./
      dockerfile: ./docker/api/Dockerfile
      args:
        NODE_ENV: production
    container_name: appleberry_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?error}
      DIRECT_URL: ${DIRECT_URL:?error}
      REDIS_URL: ${REDIS_URL:?error}
      API_PORT: 4000
      API_HOST: 0.0.0.0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?error}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?error}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?error}
      S3_ENDPOINT: ${S3_ENDPOINT:?error}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?error}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?error}
      S3_BUCKET: ${S3_BUCKET:?error}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./.appleberry-wa-web:/root/.appleberry-wa-web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - appleberry_internal
    mem_limit: 1g
    cpus: '1.0'

  # Appleberry Web - Next.js Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/web/Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?error}
    container_name: appleberry_web
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?error}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout:10s
      retries: 3
      start_period: 40s
    networks:
      - appleberry_internal
    mem_limit: 512m
    cpus: '0.5'

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: appleberry_nginx
    restart: always
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - appleberry_internal
    mem_limit: 256m
    cpus: '0.5'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  appleberry_internal:
    driver: bridge
